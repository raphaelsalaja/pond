name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          # The desktop postinstall pulls a ~30MB pinned yt-dlp binary
          # we don't need for typecheck/lint/build of the renderer bundles.
          POND_SKIP_YTDLP: "1"

      - name: Lint
        run: pnpm exec biome ci .

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
