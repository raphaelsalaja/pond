appId: so.pond.desktop
productName: pond
copyright: "Copyright © 2026 Raphael Salaja"
asar: true
# Native .node binaries (better-sqlite3, keytar, sqlite-vec) can't live
# inside the asar archive or dlopen() can't find them.
asarUnpack:
  - resources/**
  - "**/*.node"
  - "**/node_modules/better-sqlite3/**"
  - "**/node_modules/keytar/**"
  - "**/node_modules/sqlite-vec*/**"

directories:
  buildResources: build
  output: dist

files:
  - out/**/*
  - package.json
  - "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!**/node_modules/*/{test,__tests__,tests,powered-test,example,examples}"
  - "!**/*.{d.ts,map}"
  - "!**/*.tsbuildinfo"

# Tray icons and any other runtime-loaded assets. At runtime we read
# them from `process.resourcesPath` which lands inside `Contents/Resources`
# on macOS / `resources/` on Windows+Linux.
#
# `resources/bin/yt-dlp` is the standalone yt-dlp binary, downloaded by
# `scripts/download-yt-dlp.mjs` during `pnpm install`. We ship it via
# extraResources rather than asarUnpack because we need to spawn it as
# a separate process (asar paths aren't executable).
#
# `node_modules/ffmpeg-static/ffmpeg` is the static ffmpeg yt-dlp uses
# to mux adaptive streams (most TikTok / IG Reels / YT downloads need
# it). `extraResources` flattens it next to the yt-dlp binary so the
# in-app `binariesAvailable` lookup can find both with the same root.
extraResources:
  - from: resources
    to: .
    filter:
      - "**/*"
  - from: node_modules/ffmpeg-static/ffmpeg
    to: bin/ffmpeg

extraMetadata:
  main: ./out/main/index.js

# electron-builder rebuilds native modules against the packaged Electron
# ABI before bundling. Combined with the `postinstall` script in
# package.json this gives us clean `better-sqlite3` + `keytar` binaries
# on dev install AND on CI.
npmRebuild: true

mac:
  category: public.app-category.productivity
  artifactName: ${productName}-${version}-${arch}.${ext}
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  # Notarization + signing use env vars: APPLE_ID, APPLE_ID_PASSWORD,
  # APPLE_TEAM_ID, CSC_LINK, CSC_KEY_PASSWORD. Build works unsigned locally.
  notarize: false
  hardenedRuntime: true
  gatekeeperAssess: false

dmg:
  sign: false

win:
  target:
    - target: nsis
      arch:
        - x64
        - arm64

linux:
  target:
    - target: AppImage
    - target: deb
  category: Utility

publish:
  provider: github
  owner: raphaelsalaja
  repo: pond
  releaseType: release
