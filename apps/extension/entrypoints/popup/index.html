<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>pond</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header>
      <h1>pond</h1>
      <span class="status" id="status"></span>
    </header>

    <section class="quick">
      <button id="saveCurrent" type="button">Save current page</button>
      <p class="hint" id="quickHint">Cmd / Ctrl + Shift + S</p>
    </section>

    <section>
      <p class="probe" id="appProbe"></p>

      <div class="pairing">
        <label for="pairing">Paste pairing link</label>
        <input id="pairing" type="text" placeholder="pond://pair?port=41610&token=…" />
        <button id="applyPairing" type="button">Apply</button>
      </div>

      <label for="endpoint">Ingest URL</label>
      <input id="endpoint" type="url" placeholder="http://127.0.0.1:41610/api/v2/item/add" />

      <label for="apiKey">Ingest token</label>
      <input id="apiKey" type="password" placeholder="paste token from pond menu-bar" />

      <fieldset>
        <legend>Capture</legend>
        <label><input type="checkbox" data-site="twitter" /> Twitter / X</label>
        <label><input type="checkbox" data-site="instagram" /> Instagram</label>
        <label><input type="checkbox" data-site="pinterest" /> Pinterest</label>
        <label><input type="checkbox" data-site="arena" /> Are.na</label>
        <label><input type="checkbox" data-site="cosmos" /> Cosmos</label>
        <label><input type="checkbox" data-site="tiktok" /> TikTok</label>
        <label><input type="checkbox" data-site="youtube" /> YouTube</label>
        <label><input type="checkbox" data-site="article" /> Articles</label>
      </fieldset>

      <button id="save" type="button">Save settings</button>
    </section>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
