name: Feature request
description: Suggest a new capability or improvement.
title: "feat: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Before filing, please skim
        [open issues](https://github.com/raphaelsalaja/pond/issues?q=is%3Aissue+label%3Aenhancement)
        and [Discussions](https://github.com/raphaelsalaja/pond/discussions)
        to make sure this hasn't already been raised.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case in your own words. "I'd like to…" is fine.
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed solution
      description: What would success look like? UI sketches, API shapes, anything.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about and why they're worse.
  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - Desktop app (Electron)
        - Browser extension
        - New capture site
        - Library / on-disk format
        - SQLite index / search
        - Ingest API
        - AI enrichment
        - Other
    validations:
      required: true
  - type: input
    id: site
    attributes:
      label: If this is a new capture site, which one?
      placeholder: e.g. Reddit, Notion, Substack
  - type: checkboxes
    id: terms
    attributes:
      label: Code of conduct
      options:
        - label: I agree to follow this project's [Code of Conduct](https://github.com/raphaelsalaja/pond/blob/main/CODE_OF_CONDUCT.md).
          required: true
